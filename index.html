    var p = document.body || document.documentElement;

    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

(--accent, #2dd4bf); color: #06080a; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"--accent:{{accent}}; background:#0b0d10; color:#e6e9ee; font-family:'IBM Plex Sans',system-ui,sans-serif; min-height:100vh; -webkit-font-smoothing:antialiased; overflow-x:hidden;\">\n\n  <!-- NAV -->\n  <nav style=\"position:sticky; top:0; z-index:50; display:flex; align-items:center; justify-content:space-between; padding:20px 48px; background:rgba(11,13,16,0.72); backdrop-filter:blur(14px); border-bottom:1px solid rgba(255,255,255,0.06);\">\n    <div style=\"display:flex; align-items:center; gap:10px;\">\n      <span style=\"width:9px; height:9px; border-radius:50%; background:var(--accent,#2dd4bf); box-shadow:0 0 12px var(--accent,#2dd4bf);\"><\u002Fspan>\n      <span style=\"font-family:'JetBrains Mono',monospace; font-size:14px; letter-spacing:0.02em; color:#e6e9ee;\">zahoor.ullah<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex; align-items:center; gap:32px; font-size:14.5px; color:#8b93a1;\">\n      <a href=\"#work\" style=\"color:#8b93a1; text-decoration:none;\">Work<\u002Fa>\n      <a href=\"#stack\" style=\"color:#8b93a1; text-decoration:none;\">Stack<\u002Fa>\n      <a href=\"#about\" style=\"color:#8b93a1; text-decoration:none;\">About<\u002Fa>\n      <a href=\"#contact\" style=\"display:inline-flex; align-items:center; gap:8px; padding:9px 18px; border-radius:8px; background:var(--accent,#2dd4bf); color:#06080a; font-weight:600; text-decoration:none;\">Hire me<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fnav>\n\n  <!-- HERO -->\n  <header style=\"max-width:1120px; margin:0 auto; padding:96px 48px 72px;\">\n    <div style=\"display:inline-flex; align-items:center; gap:9px; padding:7px 14px; border:1px solid rgba(255,255,255,0.1); border-radius:999px; font-family:'JetBrains Mono',monospace; font-size:12.5px; color:#8b93a1; margin-bottom:34px;\">\n      <span style=\"width:7px; height:7px; border-radius:50%; background:var(--accent,#2dd4bf); box-shadow:0 0 10px var(--accent,#2dd4bf);\"><\u002Fspan>\n      Available for freelance projects\n    <\u002Fdiv>\n    <h1 style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:66px; line-height:1.04; letter-spacing:-0.02em; margin:0 0 26px; max-width:900px;\">\n      I build backend systems that stay <span style=\"color:var(--accent,#2dd4bf);\">fast under load<\u002Fspan>.\n    <\u002Fh1>\n    <p style=\"font-size:21px; line-height:1.6; color:#a4abb8; max-width:660px; margin:0 0 40px;\">\n      Backend &amp; AI systems engineer with 5+ years building high-concurrency APIs, multi-level caching, real-time data pipelines, and LLM services in Go (Echo) and Python (FastAPI, Django, Flask). I make services that serve thousands of concurrent clients in microseconds — and I can prove it.\n    <\u002Fp>\n    <div style=\"display:flex; gap:14px; flex-wrap:wrap; margin-bottom:64px;\">\n      <a href=\"#contact\" style=\"display:inline-flex; align-items:center; gap:9px; padding:14px 26px; border-radius:10px; background:var(--accent,#2dd4bf); color:#06080a; font-weight:600; font-size:16px; text-decoration:none;\">Start a project →<\u002Fa>\n      <a href=\"#work\" style=\"display:inline-flex; align-items:center; gap:9px; padding:14px 26px; border-radius:10px; border:1px solid rgba(255,255,255,0.14); color:#e6e9ee; font-weight:500; font-size:16px; text-decoration:none;\">See the work<\u002Fa>\n    <\u002Fdiv>\n\n    <!-- stat band -->\n    <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.07); border-radius:14px; overflow:hidden;\">\n      <div style=\"background:#0e1116; padding:26px 28px;\">\n        <div style=\"font-family:'Space Grotesk',sans-serif; font-size:34px; font-weight:600; color:#e6e9ee;\">10k+<\u002Fdiv>\n        <div style=\"font-size:13.5px; color:#8b93a1; margin-top:6px;\">concurrent clients served<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#0e1116; padding:26px 28px;\">\n        <div style=\"font-family:'Space Grotesk',sans-serif; font-size:34px; font-weight:600; color:var(--accent,#2dd4bf);\">&lt;1ms<\u002Fdiv>\n        <div style=\"font-size:13.5px; color:#8b93a1; margin-top:6px;\">hot-path response time<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#0e1116; padding:26px 28px;\">\n        <div style=\"font-family:'Space Grotesk',sans-serif; font-size:34px; font-weight:600; color:#e6e9ee;\">1<\u002Fdiv>\n        <div style=\"font-size:13.5px; color:#8b93a1; margin-top:6px;\">backend fetch per key, not thousands<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#0e1116; padding:26px 28px;\">\n        <div style=\"font-family:'Space Grotesk',sans-serif; font-size:34px; font-weight:600; color:#e6e9ee;\">5+ yrs<\u002Fdiv>\n        <div style=\"font-size:13.5px; color:#8b93a1; margin-top:6px;\">backend &amp; AI engineering<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- WORK -->\n  <section id=\"work\" style=\"max-width:1120px; margin:0 auto; padding:56px 48px 40px;\">\n    <div style=\"display:flex; align-items:baseline; justify-content:space-between; margin-bottom:44px; border-bottom:1px solid rgba(255,255,255,0.08); padding-bottom:20px;\">\n      <h2 style=\"font-family:'Space Grotesk',sans-serif; font-size:30px; font-weight:600; letter-spacing:-0.01em; margin:0;\">Selected work<\u002Fh2>\n      <span style=\"font-family:'JetBrains Mono',monospace; font-size:13px; color:#6b7280;\">// problem → solution → result<\u002Fspan>\n    <\u002Fdiv>\n\n    <!-- CASE 1 -->\n    <article style=\"display:grid; grid-template-columns:1fr 1.15fr; gap:48px; align-items:start; margin-bottom:64px;\">\n      <div>\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:12.5px; color:var(--accent,#2dd4bf); margin-bottom:16px;\">01 · GO · REDIS · ECHO<\u002Fdiv>\n        <h3 style=\"font-family:'Space Grotesk',sans-serif; font-size:27px; font-weight:600; line-height:1.2; margin:0 0 20px;\">High-concurrency app-settings API with two-level caching<\u002Fh3>\n        <div style=\"display:flex; flex-direction:column; gap:16px;\">\n          <div><span style=\"font-family:'JetBrains Mono',monospace; font-size:11.5px; color:#6b7280; text-transform:uppercase; letter-spacing:0.08em;\">Problem<\u002Fspan><p style=\"margin:5px 0 0; font-size:15.5px; line-height:1.6; color:#a4abb8;\">A mobile platform needed per-device, per-country settings served to 10k+ concurrent clients without overloading the core backend.<\u002Fp><\u002Fdiv>\n          <div><span style=\"font-family:'JetBrains Mono',monospace; font-size:11.5px; color:#6b7280; text-transform:uppercase; letter-spacing:0.08em;\">Solution<\u002Fspan><p style=\"margin:5px 0 0; font-size:15.5px; line-height:1.6; color:#a4abb8;\">A cache-first Go microservice with in-process L1 + Redis/KeyDB L2, stale-while-revalidate, singleflight dedup, negative caching, TTL jitter, and a bounded async write pool.<\u002Fp><\u002Fdiv>\n          <div><span style=\"font-family:'JetBrains Mono',monospace; font-size:11.5px; color:var(--accent,#2dd4bf); text-transform:uppercase; letter-spacing:0.08em;\">Result<\u002Fspan><p style=\"margin:5px 0 0; font-size:15.5px; line-height:1.6; color:#d5dae2;\">Hot requests served from memory in microseconds; the backend sees one fetch per key instead of thousands, degrading gracefully under load.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:repeating-linear-gradient(135deg,#0e1116,#0e1116 11px,#111621 11px,#111621 22px); border:1px solid rgba(255,255,255,0.09); border-radius:14px; aspect-ratio:4/3; display:flex; align-items:center; justify-content:center; font-family:'JetBrains Mono',monospace; font-size:13px; color:#6b7280; text-align:center; padding:24px;\">architecture diagram<br>/ load-test screenshot<\u002Fdiv>\n    <\u002Farticle>\n\n    <!-- CASE 2 -->\n    <article style=\"display:grid; grid-template-columns:1.15fr 1fr; gap:48px; align-items:start; margin-bottom:64px;\">\n      <div style=\"background:repeating-linear-gradient(135deg,#0e1116,#0e1116 11px,#111621 11px,#111621 22px); border:1px solid rgba(255,255,255,0.09); border-radius:14px; aspect-ratio:4/3; display:flex; align-items:center; justify-content:center; font-family:'JetBrains Mono',monospace; font-size:13px; color:#6b7280; text-align:center; padding:24px;\">NOTIFY → listener<br>→ cache flush diagram<\u002Fdiv>\n      <div>\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:12.5px; color:var(--accent,#2dd4bf); margin-bottom:16px;\">02 · POSTGRES · GO · REDIS<\u002Fdiv>\n        <h3 style=\"font-family:'Space Grotesk',sans-serif; font-size:27px; font-weight:600; line-height:1.2; margin:0 0 20px;\">Real-time cache invalidation with Postgres LISTEN/NOTIFY<\u002Fh3>\n        <div style=\"display:flex; flex-direction:column; gap:16px;\">\n          <div><span style=\"font-family:'JetBrains Mono',monospace; font-size:11.5px; color:#6b7280; text-transform:uppercase; letter-spacing:0.08em;\">Problem<\u002Fspan><p style=\"margin:5px 0 0; font-size:15.5px; line-height:1.6; color:#a4abb8;\">Cached settings stayed stale for minutes after admins updated the database.<\u002Fp><\u002Fdiv>\n          <div><span style=\"font-family:'JetBrains Mono',monospace; font-size:11.5px; color:#6b7280; text-transform:uppercase; letter-spacing:0.08em;\">Solution<\u002Fspan><p style=\"margin:5px 0 0; font-size:15.5px; line-height:1.6; color:#a4abb8;\">Postgres triggers fire pg_notify on every write across all tenant schemas; a resilient Go listener with auto-reconnect flushes the Redis namespace instantly. Trigger install is automated at startup.<\u002Fp><\u002Fdiv>\n          <div><span style=\"font-family:'JetBrains Mono',monospace; font-size:11.5px; color:var(--accent,#2dd4bf); text-transform:uppercase; letter-spacing:0.08em;\">Result<\u002Fspan><p style=\"margin:5px 0 0; font-size:15.5px; line-height:1.6; color:#d5dae2;\">Writes reflect in API responses within milliseconds — no polling, no manual clearing, multi-tenant safe.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Farticle>\n\n    <!-- CASE 3 -->\n    <article style=\"display:grid; grid-template-columns:1fr 1.15fr; gap:48px; align-items:start; margin-bottom:16px;\">\n      <div>\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:12.5px; color:var(--accent,#2dd4bf); margin-bottom:16px;\">03 · GO · MAXMIND · GEOIP<\u002Fdiv>\n        <h3 style=\"font-family:'Space Grotesk',sans-serif; font-size:27px; font-weight:600; line-height:1.2; margin:0 0 20px;\">GeoIP country detection for localized responses<\u002Fh3>\n        <div style=\"display:flex; flex-direction:column; gap:16px;\">\n          <div><span style=\"font-family:'JetBrains Mono',monospace; font-size:11.5px; color:#6b7280; text-transform:uppercase; letter-spacing:0.08em;\">Problem<\u002Fspan><p style=\"margin:5px 0 0; font-size:15.5px; line-height:1.6; color:#a4abb8;\">The API had to return country-specific settings without clients sending their country.<\u002Fp><\u002Fdiv>\n          <div><span style=\"font-family:'JetBrains Mono',monospace; font-size:11.5px; color:#6b7280; text-transform:uppercase; letter-spacing:0.08em;\">Solution<\u002Fspan><p style=\"margin:5px 0 0; font-size:15.5px; line-height:1.6; color:#a4abb8;\">MaxMind GeoLite2 with an in-memory IP→country cache, robust client-IP extraction behind proxies, private-IP detection with configurable fallback, and per-country cache keys.<\u002Fp><\u002Fdiv>\n          <div><span style=\"font-family:'JetBrains Mono',monospace; font-size:11.5px; color:var(--accent,#2dd4bf); text-transform:uppercase; letter-spacing:0.08em;\">Result<\u002Fspan><p style=\"margin:5px 0 0; font-size:15.5px; line-height:1.6; color:#d5dae2;\">Correct localization on every request with near-zero added latency, safe behind proxies and in dev.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:repeating-linear-gradient(135deg,#0e1116,#0e1116 11px,#111621 11px,#111621 22px); border:1px solid rgba(255,255,255,0.09); border-radius:14px; aspect-ratio:4/3; display:flex; align-items:center; justify-content:center; font-family:'JetBrains Mono',monospace; font-size:13px; color:#6b7280; text-align:center; padding:24px;\">IP resolution flow<br>/ code excerpt<\u002Fdiv>\n    <\u002Farticle>\n  <\u002Fsection>\n\n  <!-- AI STRIP -->\n  <section style=\"max-width:1120px; margin:0 auto; padding:40px 48px 20px;\">\n    <div style=\"background:#0e1116; border:1px solid rgba(255,255,255,0.08); border-radius:16px; padding:44px 48px; display:grid; grid-template-columns:1fr 1fr; gap:40px; align-items:center;\">\n      <div>\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:12.5px; color:var(--accent,#2dd4bf); margin-bottom:14px;\">04 · AI &amp; LLM<\u002Fdiv>\n        <h3 style=\"font-family:'Space Grotesk',sans-serif; font-size:26px; font-weight:600; line-height:1.2; margin:0 0 14px;\">Document intelligence &amp; semantic search<\u002Fh3>\n        <p style=\"font-size:15.5px; line-height:1.65; color:#a4abb8; margin:0;\">Production LLM services in FastAPI: LangChain + OpenAI pipelines that parse unstructured documents into structured data through engineered prompts, and embedding-based retrieval that lets users query document collections in natural language.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:12px;\">\n        <div style=\"display:flex; align-items:center; gap:12px; font-size:14.5px; color:#d5dae2;\"><span style=\"color:var(--accent,#2dd4bf); font-family:'JetBrains Mono',monospace;\">▸<\u002Fspan> LangChain + OpenAI orchestration<\u002Fdiv>\n        <div style=\"display:flex; align-items:center; gap:12px; font-size:14.5px; color:#d5dae2;\"><span style=\"color:var(--accent,#2dd4bf); font-family:'JetBrains Mono',monospace;\">▸<\u002Fspan> Prompt-engineered structured extraction<\u002Fdiv>\n        <div style=\"display:flex; align-items:center; gap:12px; font-size:14.5px; color:#d5dae2;\"><span style=\"color:var(--accent,#2dd4bf); font-family:'JetBrains Mono',monospace;\">▸<\u002Fspan> Embedding-based semantic search<\u002Fdiv>\n        <div style=\"display:flex; align-items:center; gap:12px; font-size:14.5px; color:#d5dae2;\"><span style=\"color:var(--accent,#2dd4bf); font-family:'JetBrains Mono',monospace;\">▸<\u002Fspan> Predictive ML pipelines (TF, XGBoost)<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- MORE WORK -->\n  <section style=\"max-width:1120px; margin:0 auto; padding:20px 48px 56px;\">\n    <div style=\"display:grid; grid-template-columns:repeat(2,1fr); gap:20px;\">\n      <div style=\"background:#0e1116; border:1px solid rgba(255,255,255,0.08); border-radius:14px; padding:28px 30px;\">\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:11.5px; color:var(--accent,#2dd4bf); margin-bottom:12px;\">DJANGO · DRF · MULTI-TENANT<\u002Fdiv>\n        <h4 style=\"font-family:'Space Grotesk',sans-serif; font-size:19px; font-weight:600; margin:0 0 10px;\">DealerAdmin — car insurance platform<\u002Fh4>\n        <p style=\"font-size:14.5px; line-height:1.6; color:#a4abb8; margin:0;\">Multi-tenant platform with secure tenant isolation for hundreds of dealers. Built Django REST Framework APIs integrating third-party insurance and verification services, with real-time policy generation and query/indexing optimization for high-volume transactions.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#0e1116; border:1px solid rgba(255,255,255,0.08); border-radius:14px; padding:28px 30px;\">\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:11.5px; color:var(--accent,#2dd4bf); margin-bottom:12px;\">FASTAPI · CELERY · POSTGRES<\u002Fdiv>\n        <h4 style=\"font-family:'Space Grotesk',sans-serif; font-size:19px; font-weight:600; margin:0 0 10px;\">Automated attendance &amp; analytics<\u002Fh4>\n        <p style=\"font-size:14.5px; line-height:1.6; color:#a4abb8; margin:0;\">API-first FastAPI backend for employee/student attendance with dynamic scheduling, real-time tracking, and reporting. SQLAlchemy schemas, Redis caching, Celery async processing, JWT auth, and full Swagger/OpenAPI docs.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- STACK -->\n  <section id=\"stack\" style=\"max-width:1120px; margin:0 auto; padding:40px 48px 56px;\">\n    <div style=\"display:flex; align-items:baseline; justify-content:space-between; margin-bottom:36px; border-bottom:1px solid rgba(255,255,255,0.08); padding-bottom:20px;\">\n      <h2 style=\"font-family:'Space Grotesk',sans-serif; font-size:30px; font-weight:600; letter-spacing:-0.01em; margin:0;\">The stack<\u002Fh2>\n      <span style=\"font-family:'JetBrains Mono',monospace; font-size:13px; color:#6b7280;\">// backend + frontend<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:24px;\">\n      <div>\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--accent,#2dd4bf); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:16px;\">Backend<\u002Fdiv>\n        <div style=\"display:flex; flex-wrap:wrap; gap:9px;\">\n          <span style=\"padding:8px 14px; border:1px solid rgba(255,255,255,0.11); border-radius:8px; font-size:14px; color:#d5dae2;\">Python<\u002Fspan>\n          <span style=\"padding:8px 14px; border:1px solid rgba(255,255,255,0.11); border-radius:8px; font-size:14px; color:#d5dae2;\">Go / Echo<\u002Fspan>\n          <span style=\"padding:8px 14px; border:1px solid rgba(255,255,255,0.11); border-radius:8px; font-size:14px; color:#d5dae2;\">FastAPI<\u002Fspan>\n          <span style=\"padding:8px 14px; border:1px solid rgba(255,255,255,0.11); border-radius:8px; font-size:14px; color:#d5dae2;\">Django / DRF<\u002Fspan>\n          <span style=\"padding:8px 14px; border:1px solid rgba(255,255,255,0.11); border-radius:8px; font-size:14px; color:#d5dae2;\">Flask<\u002Fspan>\n          <span style=\"padding:8px 14px; border:1px solid rgba(255,255,255,0.11); border-radius:8px; font-size:14px; color:#d5dae2;\">PostgreSQL / MySQL<\u002Fspan>\n          <span style=\"padding:8px 14px; border:1px solid rgba(255,255,255,0.11); border-radius:8px; font-size:14px; color:#d5dae2;\">Redis / KeyDB<\u002Fspan>\n          <span style=\"padding:8px 14px; border:1px solid rgba(255,255,255,0.11); border-radius:8px; font-size:14px; color:#d5dae2;\">Celery<\u002Fspan>\n          <span style=\"padding:8px 14px; border:1px solid rgba(255,255,255,0.11); border-radius:8px; font-size:14px; color:#d5dae2;\">SQLAlchemy<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--accent,#2dd4bf); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:16px;\">Frontend<\u002Fdiv>\n        <div style=\"display:flex; flex-wrap:wrap; gap:9px;\">\n          <span style=\"padding:8px 14px; border:1px solid rgba(255,255,255,0.11); border-radius:8px; font-size:14px; color:#d5dae2;\">TypeScript<\u002Fspan>\n          <span style=\"padding:8px 14px; border:1px solid rgba(255,255,255,0.11); border-radius:8px; font-size:14px; color:#d5dae2;\">React<\u002Fspan>\n          <span style=\"padding:8px 14px; border:1px solid rgba(255,255,255,0.11); border-radius:8px; font-size:14px; color:#d5dae2;\">Next.js<\u002Fspan>\n          <span style=\"padding:8px 14px; border:1px solid rgba(255,255,255,0.11); border-radius:8px; font-size:14px; color:#d5dae2;\">Tailwind<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--accent,#2dd4bf); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:16px;\">AI &amp; Infra<\u002Fdiv>\n        <div style=\"display:flex; flex-wrap:wrap; gap:9px;\">\n          <span style=\"padding:8px 14px; border:1px solid rgba(255,255,255,0.11); border-radius:8px; font-size:14px; color:#d5dae2;\">LangChain<\u002Fspan>\n          <span style=\"padding:8px 14px; border:1px solid rgba(255,255,255,0.11); border-radius:8px; font-size:14px; color:#d5dae2;\">OpenAI API<\u002Fspan>\n          <span style=\"padding:8px 14px; border:1px solid rgba(255,255,255,0.11); border-radius:8px; font-size:14px; color:#d5dae2;\">Semantic search<\u002Fspan>\n          <span style=\"padding:8px 14px; border:1px solid rgba(255,255,255,0.11); border-radius:8px; font-size:14px; color:#d5dae2;\">TensorFlow / XGBoost<\u002Fspan>\n          <span style=\"padding:8px 14px; border:1px solid rgba(255,255,255,0.11); border-radius:8px; font-size:14px; color:#d5dae2;\">MaxMind GeoIP<\u002Fspan>\n          <span style=\"padding:8px 14px; border:1px solid rgba(255,255,255,0.11); border-radius:8px; font-size:14px; color:#d5dae2;\">Docker · CI/CD<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ABOUT -->\n  <section id=\"about\" style=\"max-width:1120px; margin:0 auto; padding:40px 48px 64px;\">\n    <div style=\"display:grid; grid-template-columns:1fr 1.4fr; gap:56px; align-items:start;\">\n      <div style=\"border:1px solid rgba(255,255,255,0.09); border-radius:14px; aspect-ratio:1/1; overflow:hidden;\"><img src=\"afd1f9ab-f364-40b8-b2e6-6c13db375e82\" alt=\"Zahoor Ullah\" style=\"width:100%; height:100%; object-fit:cover; display:block;\"><\u002Fdiv>\n      <div>\n        <h2 style=\"font-family:'Space Grotesk',sans-serif; font-size:30px; font-weight:600; letter-spacing:-0.01em; margin:0 0 20px;\">About<\u002Fh2>\n        <p style=\"font-size:17px; line-height:1.7; color:#a4abb8; margin:0 0 18px;\">I'm Zahoor Ullah, a backend and AI systems engineer with 5+ years shipping production services in Python and Go that have to be fast, correct, and cheap to run. My work lives where performance meets reliability — caching layers, concurrency control, real-time data flows, LLM services, and the observability to prove it all works.<\u002Fp>\n        <p style=\"font-size:17px; line-height:1.7; color:#a4abb8; margin:0;\">I work best with teams and founders who care about what happens under load. If your API is slow, your database is a bottleneck, or your AI features are burning money, that's exactly the kind of problem I like to solve.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CONTACT -->\n  <section id=\"contact\" style=\"max-width:1120px; margin:0 auto; padding:24px 48px 96px;\">\n    <div style=\"background:linear-gradient(160deg,#0f1520,#0b0d10); border:1px solid rgba(255,255,255,0.1); border-radius:20px; padding:64px 56px; text-align:center;\">\n      <h2 style=\"font-family:'Space Grotesk',sans-serif; font-size:42px; font-weight:600; letter-spacing:-0.02em; line-height:1.1; margin:0 0 18px;\">Let's make it faster.<\u002Fh2>\n      <p style=\"font-size:18px; line-height:1.6; color:#a4abb8; max-width:520px; margin:0 auto 34px;\">Available for freelance backend, AI, and full-stack work. Tell me what's slow — I'll tell you how I'd fix it.<\u002Fp>\n      <div style=\"display:flex; gap:14px; justify-content:center; flex-wrap:wrap; margin-bottom:36px;\">\n        <a href=\"mailto:zahoor.orakzai11@gmail.com\" style=\"display:inline-flex; align-items:center; gap:9px; padding:15px 30px; border-radius:10px; background:var(--accent,#2dd4bf); color:#06080a; font-weight:600; font-size:16px; text-decoration:none;\">zahoor.orakzai11@gmail.com<\u002Fa>\n        <a href=\"https://github.com/zahoor-ullah\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex; align-items:center; gap:9px; padding:15px 30px; border-radius:10px; border:1px solid rgba(255,255,255,0.16); color:#e6e9ee; font-weight:500; font-size:16px; text-decoration:none;\">View GitHub<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:22px; justify-content:center; font-family:'JetBrains Mono',monospace; font-size:13px; color:#6b7280;\">\n        <a href=\"https://github.com/zahoor-ullah\" target=\"_blank\" rel=\"noopener\" style=\"color:#8b93a1; text-decoration:none;\">GitHub<\u002Fa><span>·<\u002Fspan>\n        <a href=\"https://www.linkedin.com/in/zahoor-ullah-13bbb6134/\" target=\"_blank\" rel=\"noopener\" style=\"color:#8b93a1; text-decoration:none;\">LinkedIn<\u002Fa><span>·<\u002Fspan>\n        <a href=\"#\" target=\"_blank\" rel=\"noopener\" style=\"color:#8b93a1; text-decoration:none;\">Upwork<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"text-align:center; margin-top:40px; font-family:'JetBrains Mono',monospace; font-size:12.5px; color:#4b5361;\">© 2026 Zahoor Ullah · built for speed<\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1120,&quot;height&quot;:800},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#2dd4bf&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#2dd4bf&quot;,&quot;#60a5fa&quot;,&quot;#a78bfa&quot;,&quot;#f59e0b&quot;]}}\">\nclass Component extends DCLogic {\n  renderVals() {\n    return {\n      accent: this.props.accent ?? '#2dd4bf',\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
